<!doctype html>
<html>
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="/assets/main.css" />
	<link href="https://fonts.googleapis.com/css?family=Nunito|Open+Sans" rel="stylesheet">
	<link rel="stylesheet" href="/vendor/fontawesome-6/css/fontawesome.min.css">
	<link rel="stylesheet" href="/vendor/fontawesome-6/css/solid.min.css">
	<link rel="stylesheet" href="/vendor/fontawesome-6/css/brands.min.css">
	{{ template "_internal/google_analytics.html" . }}
	{{ template "_internal/opengraph.html" . }}
	<link rel="icon" type="image/svg" href="/branding/cilindir-favicon-light-mode.svg" media="(prefers-color-scheme: light)">
    <link rel="icon" type="image/svg" href="/branding/cilindir-favicon-dark-mode.svg" media="(prefers-color-scheme: dark)">
</head>
<body>
	<!-- Include Header Partial -->
    {{ partial "header.html" . }}

    <img src="/branding/cilindir.svg" alt="Cilindir: From Any Place to Every Face" style="width: 350px; height: auto;">

	<div id="benefits">
		{{ range (where .Site.Pages "Section" "benefits") }}
		{{ range .Pages }}
			<div>
				<h2><i class="fas {{ .Params.icon }}"></i>{{ .Title }}</h2>
				{{ .Content }}
			</div>
		{{ end }}
	{{ end }}
	</div>

    <!-- Include Footer Partial -->
    {{ partial "footer.html" . }}

</body>
</html>
